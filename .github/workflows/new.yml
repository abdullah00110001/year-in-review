name: 🚀 Build Native LifeOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: 📱 Build Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java v21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      # Fresh Build - No Cache, No Daemon, No Build-Cache
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-build-cache --stacktrace

      - name: Check APK Signature
        run: |
          keytool -printcert -jarfile android/app/build/outputs/apk/release/app-release.apk | grep Owner

      - name: Rename to LifeOS.apk
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/LifeOS.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-apk
          path: android/app/build/outputs/apk/release/LifeOS.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: LifeOS Native Release ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/LifeOS.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}