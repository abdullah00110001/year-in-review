name: 🚀 Build Signed Release LifeOS
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: 📱 Build Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java v21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      # Build a SIGNED RELEASE APK using the committed mylifeos-release.keystore.
      # versionCode is derived from the workflow run number so every build is
      # a strictly higher version → clean install-over-existing every time.
      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=1.0.${{ github.run_number }} \
            --no-daemon --stacktrace

      - name: Verify APK exists
        run: ls -la android/app/build/outputs/apk/release/

      - name: Rename to LifeOS.apk
        run: mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/LifeOS.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-APK
          path: android/app/build/outputs/apk/release/LifeOS.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: LifeOS Release 1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/release/LifeOS.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
