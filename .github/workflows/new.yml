name: 🚀 Build Debug LifeOS
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    name: 📱 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java v21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK # 👈 শুধু এটা Change
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename to LifeOS-Debug.apk
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LifeOS-Debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: debug-v1.0.${{ github.run_number }}
          name: LifeOS Debug Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/LifeOS-Debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}