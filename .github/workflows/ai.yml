name: AI Auto-Fix + Auto Test APK

on:
  workflow_run:
    workflows: ["🚀 Build Native LifeOS"]
    types: [completed]

jobs:
  ai-fix:
    # এই লাইনটা চেঞ্জ করছি - আগে failure চেক করতো, এখন সব সময় রান হবে
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Build Logs
        id: get_logs
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            // ফেইল হলে ফেইলড জব, সাকসেস হলে লাস্ট জবের লগ নিবে
            let targetJob = jobs.data.jobs.find(job => job.conclusion === 'failure');
            if (!targetJob) {
              targetJob = jobs.data.jobs[jobs.data.jobs.length - 1]; // সাকসেস হলে লাস্ট জব
            }
            const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: targetJob.id,
            });
            const logText = log.data.toString().slice(-50000);
            core.setOutput('log', logText);
            core.setOutput('conclusion', '${{ github.event.workflow_run.conclusion }}');

      - name: Setup Node for AI Script
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Gemini AI Analysis
        id: ai_fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUILD_LOG: ${{ steps.get_logs.outputs.log }}
          BUILD_STATUS: ${{ steps.get_logs.outputs.conclusion }}
        run: |
          npm init -y
          npm install @google/generative-ai
          node -e "
          const { GoogleGenerativeAI } = require('@google/generative-ai');
          const fs = require('fs');
          const { execSync } = require('child_process');
          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: 'gemini-2.5-pro' });
          const buildLog = process.env.BUILD_LOG;
          const buildStatus = process.env.BUILD_STATUS;
          const allFiles = execSync('find android -type f \\( -name \"*.java\" -o -name \"*.xml\" -o -name \"*.gradle\" \\) | head -20').toString().split('\n').filter(Boolean);
          let codeContext = '';
          allFiles.forEach(file => {
            try {
              codeContext += `\n--- FILE: ${file} ---\n` + fs.readFileSync(file, 'utf8').slice(0, 3000);
            } catch(e) {}
          });
          const prompt = \`You are an expert Android developer. My GitHub Actions build status is: ${buildStatus}.
          BUILD LOG: \`\`\`${buildLog}\`\`\`
          PROJECT CODE: \`\`\`${codeContext}\`\`\`
          Task:
          1. If build FAILED: Explain root cause in 1-2 sentences and provide fixes.
          2. If build SUCCEEDED: Suggest optimizations or improvements. If no changes needed, return empty fixes array.
          3. Format: Respond ONLY with a JSON object like this: {\"build_status\": \"${buildStatus}\", \"root_cause\": \"...\", \"fixes\": [{\"file\": \"path/to/file.java\", \"content\": \"full new file content...\"}]} Do not add any text outside the JSON.\`;
          (async () => {
            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text().replace(/\\\`\\\`\\\`json|\\\`\\\`\\\`/g, '').trim();
            fs.writeFileSync('ai_fix.json', text);
            console.log('AI analysis complete.');
          })();
          "

      - name: Apply AI Fixes and Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            if (!fs.existsSync('ai_fix.json')) {
              console.log('ai_fix.json not found');
              return;
            }
            const aiFix = JSON.parse(fs.readFileSync('ai_fix.json', 'utf8'));
            console.log('Build Status:', aiFix.build_status);
            console.log('Root Cause:', aiFix.root_cause);

            // সাকসেস হলে আর ফিক্স না থাকলে PR বানাবে না
            if (aiFix.build_status === 'success' && (!aiFix.fixes || aiFix.fixes.length === 0)) {
              console.log('Build succeeded and AI has no improvements. Skipping PR.');
              return;
            }
            if (!aiFix.fixes || aiFix.fixes.length === 0) {
              console.log('AI could not determine a fix.');
              return;
            }

            const branchName = `ai-${aiFix.build_status}/${context.runId}`;
            execSync(`git checkout -b ${branchName}`);
            aiFix.fixes.forEach(fix => {
              fs.writeFileSync(fix.file, fix.content);
              console.log(`Fixed: ${fix.file}`);
            });
            execSync(`git config user.name "AI Fixer Bot"`);
            execSync(`git config user.email "bot@users.noreply.github.com"`);
            execSync(`git add.`);
            const commitMsg = aiFix.build_status === 'failure'
             ? `fix: AI auto-fix for build failure\n\nRoot Cause: ${aiFix.root_cause}`
              : `chore: AI optimization suggestion\n\nDetails: ${aiFix.root_cause}`;
            execSync(`git commit -m "${commitMsg}"`);
            execSync(`git push origin ${branchName}`);

            const prTitle = aiFix.build_status === 'failure'
             ? `🤖 AI Fix: Build Failure`
              : `✨ AI Optimization: Build Succeeded`;
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: branchName,
              base: '${{ github.event.workflow_run.head_branch }}',
              body: `### AI Build Analysis\n\n**Build Status:** ${aiFix.build_status}\n**Root Cause/Details:**\n${aiFix.root_cause}\n\n**Files Changed:**\n${aiFix.fixes.map(f => `- \`${f.file}\``).join('\n')}\n\nThis PR was automatically generated by Gemini. Please review and merge.`
            });

  test-apk:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download APK from build workflow
        uses: actions/download-artifact@v4
        with:
          name: lifeos-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run Emulator and Auto Login Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: |
            adb install LifeOS.apk
            adb logcat -c
            adb shell monkey -p com.mylifeos.app -c android.intent.category.LAUNCHER 1
            sleep 8
            adb shell input text "abdullahusimin1@gmail.com"
            adb shell input keyevent 61
            adb shell input keyevent 61
            adb shell input text "123456"
            adb shell input keyevent 66
            sleep 20
            adb logcat -d > full_log.txt
            adb logcat -d *:E > error_log.txt
            if grep -q "FATAL EXCEPTION" error_log.txt; then
              echo "CRASH DETECTED! App crashed after login."
              echo "--- Error Log ---"
              cat error_log.txt
              exit 1
            else
              echo "SUCCESS! App did not crash after login."
            fi

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-test-logs
          path: |
            full_log.txt
            error_log.txt