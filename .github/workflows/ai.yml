name: AI Auto-Fix + Auto Test APK

on:
  workflow_run:
    workflows: ["🚀 Build Native LifeOS", "AI Auto-Fix + Auto Test APK"]
    types: [completed]

jobs:
  ai-fix:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Failed Job Logs
        id: get_logs
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });

            // সব ফেইল জব খুঁজো, বিল্ড বা টেস্ট যেটাই হোক
            let targetJob = jobs.data.jobs.find(job => job.conclusion === 'failure');

            // যদি কোনো ফেইল না থাকে তাহলে শেষ জব নাও সাকসেস কেসের জন্য
            if (!targetJob) {
              targetJob = jobs.data.jobs[jobs.data.jobs.length - 1];
            }

            const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: targetJob.id,
            });

            const logText = log.data.toString().slice(-50000);
            core.setOutput('log', logText);
            core.setOutput('conclusion', '${{ github.event.workflow_run.conclusion }}');
            core.setOutput('job_name', targetJob.name);
            core.setOutput('workflow_name', '${{ github.event.workflow_run.name }}');

      - name: Setup Node for AI Script
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Gemini AI Analysis
        id: ai_fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUILD_LOG: ${{ steps.get_logs.outputs.log }}
          BUILD_STATUS: ${{ steps.get_logs.outputs.conclusion }}
          JOB_NAME: ${{ steps.get_logs.outputs.job_name }}
          WORKFLOW_NAME: ${{ steps.get_logs.outputs.workflow_name }}
        run: |
          npm init -y
          npm install @google/generative-ai
          cat > ai_script.js << 'EOF'
          const { GoogleGenerativeAI } = require('@google/generative-ai');
          const fs = require('fs');
          const { execSync } = require('child_process');
          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: 'gemini-2.5-pro' });

          const buildLog = process.env.BUILD_LOG;
          const buildStatus = process.env.BUILD_STATUS;
          const jobName = process.env.JOB_NAME;
          const workflowName = process.env.WORKFLOW_NAME;

          let codeContext = '';
          try {
            // এখন টেস্টের জন্য yml ফাইলও নিলাম
            const allFiles = execSync('find android.github -type f \\( -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.yml" \\) | head -25').toString().split('\n').filter(Boolean);
            allFiles.forEach(file => {
              try {
                codeContext += `\n--- FILE: ${file} ---\n` + fs.readFileSync(file, 'utf8').slice(0, 3000);
              } catch(e) {}
            });
          } catch(e) { console.log('Error reading files:', e.message); }

          const prompt = `You are an expert Android developer and CI/CD expert.
          Workflow Name: ${workflowName}
          Failed Job Name: ${jobName}
          Overall Status: ${buildStatus}

          LOG: \`\`\`${buildLog}\`\`\`
          PROJECT CODE: \`\`\`${codeContext}\`\`\`

          Task:
          1. If status is FAILURE: Find root cause. If job is 'test-apk' and log has 'exit code 224' or 'FATAL EXCEPTION', explain it's an emulator crash or app crash after login. Suggest fixes for ai.yml emulator-options or app permission handling.
          2. If status is SUCCESS: Suggest 1-2 optimizations. If nothing needed, return empty fixes array.
          3. Format: Respond ONLY with JSON: {"build_status": "${buildStatus}", "root_cause": "...", "fixes": [{"file": "path/to/file.yml", "content": "full new file content..."}]}
          Do not add any text outside the JSON.`;

          (async () => {
            try {
              const result = await model.generateContent(prompt);
              const response = await result.response;
              const text = response.text().replace(/```json|```/g, '').trim();
              fs.writeFileSync('ai_fix.json', text);
              console.log('AI analysis complete.');
            } catch(e) {
              console.error('Gemini Error:', e.message);
              // AI ফেইল করলেও exit 0 দিলাম যাতে জব লাল না হয়
              fs.writeFileSync('ai_fix.json', '{"build_status": "failure", "root_cause": "AI analysis failed", "fixes": []}');
              process.exit(0);
            }
          })();
          EOF
          node ai_script.js

      - name: Apply AI Fixes and Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            if (!fs.existsSync('ai_fix.json')) {
              console.log('ai_fix.json not found');
              return;
            }
            const aiFix = JSON.parse(fs.readFileSync('ai_fix.json', 'utf8'));
            console.log('Status:', aiFix.build_status);
            console.log('Root Cause:', aiFix.root_cause);

            if (!aiFix.fixes || aiFix.fixes.length === 0) {
              console.log('AI has no fixes. Skipping PR.');
              return;
            }

            const branchName = `ai-fix/${context.runId}`;
            execSync(`git checkout -b ${branchName}`);
            aiFix.fixes.forEach(fix => {
              fs.mkdirSync(require('path').dirname(fix.file), { recursive: true });
              fs.writeFileSync(fix.file, fix.content);
              console.log(`Fixed: ${fix.file}`);
            });
            execSync(`git config user.name "AI Fixer Bot"`);
            execSync(`git config user.email "bot@users.noreply.github.com"`);
            execSync(`git add.`);
            const commitMsg = `fix: AI auto-fix for ${aiFix.build_status}\n\nRoot Cause: ${aiFix.root_cause}`;
            execSync(`git commit -m "${commitMsg}"`);
            execSync(`git push origin ${branchName}`);

            const prTitle = `🤖 AI Fix: ${aiFix.root_cause.slice(0, 50)}`;
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: branchName,
              base: '${{ github.event.workflow_run.head_branch }}',
              body: `### AI Build Analysis\n\n**Status:** ${aiFix.build_status}\n**Root Cause:**\n${aiFix.root_cause}\n\n**Files Changed:**\n${aiFix.fixes.map(f => `- \`${f.file}\``).join('\n')}\n\nThis PR was automatically generated by Gemini.`
            });

  test-apk:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == '🚀 Build Native LifeOS'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download APK from build workflow
        uses: actions/download-artifact@v4
        with:
          name: lifeos-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run Emulator and Auto Login Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -no-audio -no-boot-anim -accel auto
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb install LifeOS.apk
            adb logcat -c
            adb shell monkey -p com.mylifeos.app -c android.intent.category.LAUNCHER 1
            sleep 15
            adb shell input keyevent 61
            adb shell input text "abdullahusimin1@gmail.com"
            adb shell input keyevent 61
            adb shell input keyevent 61
            adb shell input text "123456"
            adb shell input keyevent 66
            sleep 20
            adb logcat -d > full_log.txt
            adb logcat -d *:E > error_log.txt
            if grep -q "FATAL EXCEPTION" error_log.txt; then
              echo "CRASH DETECTED! App crashed after login."
              cat error_log.txt
              exit 1
            else
              echo "SUCCESS! App did not crash after login."
            fi

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-test-logs
          path: |
            full_log.txt
            error_log.txt