name: Build & Test Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Install dependencies
        run: npm ci

      - name: 5. Build web assets
        run: npm run build

      - name: 6. Sync Capacitor Android
        run: npx cap sync android

      - name: 7. Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: 8. Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --info

      - name: 9. Run Emulator Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb shell monkey -p com.mylifeos.app -v 1
            sleep 10
            echo "--- Checking for crashes ---"
            adb logcat -d | grep -E "FATAL|AndroidRuntime" > crash.txt || true
            if [ -s crash.txt ]; then
              echo "CRASH DETECTED:"
              cat crash.txt
              exit 1
            else
              echo "No crashes found."
            fi

      - name: 10. Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mylifeos-app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 11. Upload Crash Log if Failed
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-log.txt
          path: crash.txt