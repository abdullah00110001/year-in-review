name: 🚀 Build Native LifeOS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: 📱 Build Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ১. কোড নামানো
      - name: Checkout Code
        uses: actions/checkout@v3

      # ২. নোড সেটআপ
      - name: Setup Node.js v22
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # ৩. জাভা সেটআপ (v21)
      - name: Setup Java v21
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # ৪. প্যাকেজ ইন্সটল
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # ৫. [গুরুত্বপূর্ণ] ওয়েব অ্যাসেট বিল্ড করা (Offline Mode এর জন্য)
      - name: Build Web Assets (Native Mode)
        run: npm run build

      # ৬. [গুরুত্বপূর্ণ] বিল্ড করা ফাইল অ্যান্ড্রয়েডে কপি করা
      - name: Sync Capacitor
        run: npx cap sync android

      # ৭. পারমিশন ফিক্স
      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      # ৮. APK তৈরি করা
      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      # ৯. নাম পরিবর্তন (LifeOS)
      - name: Rename to LifeOS.apk
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LifeOS.apk

      # ১০. গিটহাব রিলিজ তৈরি
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') != true
        with:
          tag_name: native-v1.${{ github.run_number }}
          name: LifeOS Native Build ${{ github.run_number }}
          body: |
            📱 Native Offline Build
            - No internet required for UI
            - Faster loading time
          files: android/app/build/outputs/apk/debug/LifeOS.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
