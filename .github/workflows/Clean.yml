name: Cleanup Old Workflow Runs

on:
  workflow_run:
    workflows: ["Keep Supabase Alive Auto"] # তোমার main workflow এর নাম
    types: [completed]
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন 1 বার চেক করবে
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old runs, keep last 10
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10 # লাস্ট 10 টা থাকবে