name: 🧹 Cleanup Old Runs & Releases

on:
  workflow_dispatch: # ম্যানুয়ালি চালাবা

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7 # 7 দিনের পুরান সব রান ডিলিট
          keep_minimum_runs: 5 # লেটেস্ট 5টা রেখে দিবে

      - name: Delete Old Releases & Tags
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 5 # লেটেস্ট 5টা রিলিজ রাখো, বাকি সব APK সহ ডিলিট
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
