name: 📸 Generate App Shorts Video

on: workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - uses: actions/setup-java@v4
        with: {distribution: 'zulu', java-version: '21'}

      - name: Build Debug APK
        run: |
          npm ci --legacy-peer-deps && npm run build
          npx cap sync android
          cd android && chmod +x gradlew &&./gradlew assembleDebug

      - name: Run Android Emulator + Record
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.lifeos.app/.MainActivity
            adb shell screenrecord /sdcard/demo.mp4 &
            sleep 15 # 15 sec app use
            adb shell pkill -l 2 screenrecord
            adb pull /sdcard/demo.mp4./demo.mp4

      - name: Add Text & Convert to Shorts 9:16
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -i demo.mp4 -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2,drawtext=text='LifeOS v${{ github.run_number }}':fontcolor=white:fontsize=60:x=(w-text_w)/2:y=100" -c:a copy shorts.mp4

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-Shorts
          path: shorts.mp4

      - name: Upload to YouTube Shorts
        if: success()
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          npm install googleapis
          node -e "
          const {google} = require('googleapis');
          const auth = new google.auth.OAuth2(process.env.YT_CLIENT_ID, process.env.YT_CLIENT_SECRET);
          auth.setCredentials({refresh_token: process.env.YT_REFRESH_TOKEN});
          const youtube = google.youtube({version: 'v3', auth});
          youtube.videos.insert({
            part: 'snippet,status',
            requestBody: {
              snippet: {title: 'LifeOS Auto Demo #${{ github.run_number }} #shorts', description: 'Auto generated by GitHub Actions'},
              status: {privacyStatus: 'public', selfDeclaredMadeForKids: false}
            },
            media: {body: require('fs').createReadStream('shorts.mp4')}
          });"