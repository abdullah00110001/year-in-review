name: 🧹 Cleanup Old Runs & Releases

on:
  workflow_dispatch: # ম্যানুয়ালি চালানোর জন্য
  schedule:
    - cron: '0 * * * *' # প্রতি 1 ঘন্টা পর পর চেক করবে। 24 ঘন্টা হলে ডিলিট

permissions:
  actions: write      # পুরান রান ডিলিট করার জন্য
  contents: write     # পুরান রিলিজ + ট্যাগ ডিলিট করার জন্য

jobs:
  cleanup:
    name: Deleting Old Data
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1           # 1 দিন = 24 ঘন্টা। এর চেয়ে পুরান সব ডিলিট
          keep_minimum_runs: 0     # 1টাও রাখবে না। 24 ঘন্টা পার হলেই গায়েব

      - name: Delete Old Releases & Tags
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 0           # লেটেস্টও রাখবে না
          delete_tags: true        # ট্যাগ সহ ডিলিট করবে
          delete_expired_releases: true
          older_than_days: 1       # 24 ঘন্টার পুরান রিলিজ+ট্যাগ সব ডিলিট
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}