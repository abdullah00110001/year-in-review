name: 🧹 Cleanup Old Runs & Releases

on:
  workflow_dispatch: # Actions ট্যাব থেকে ম্যানুয়ালি চালাতে পারবা
  schedule:
    - cron: '0 * * * *' # প্রতি ঘন্টায় অটো চেক করবে

permissions:
  actions: write # পুরান রান ডিলিট করার পারমিশন
  contents: write # রিলিজ + ট্যাগ ডিলিট করার পারমিশন

jobs:
  cleanup:
    name: Deleting Old Data
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3 # লেটেস্ট 3টা রান রাখবে। বাকি সব ডিলিট

      - name: Delete Old Releases & Tags
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3 # লেটেস্ট 3টা রিলিজ + ট্যাগ রাখবে
          delete_tags: true
          delete_expired_releases: true
          older_than_days: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}