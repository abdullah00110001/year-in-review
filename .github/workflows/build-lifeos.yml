name: 🚀 Build Native LifeOS
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-native:
    name: 📱 Build Native APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js v22
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup Java v21
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Delete lock file and install
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android &&./gradlew assembleDebug --no-daemon

      - name: Rename to LifeOS.apk
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LifeOS.apk

      - name: Upload APK for Testing
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-apk
          path: android/app/build/outputs/apk/debug/LifeOS.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: LifeOS Native Release ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/LifeOS.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}