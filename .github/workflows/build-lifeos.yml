name: 🚀 Build LifeOS Official

on:
  push:
    branches:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  security-events: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-life-os:
    name: 📱 Building LifeOS APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Scan for Leaked Secrets
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.81.0
        with:
          path: ./ 
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java v21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Unit Tests
        run: npm test -- --coverage || echo "No tests found, skipping"

      - name: Build Optimized Assets
        run: npm run build

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Permissions
        run: chmod +x android/gradlew

      - name: Build Stable APK
        id: build_apk
        continue-on-error: true
        run: |
          cd android &&./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: 🩺 LifeOS Doctor - Auto Diagnosis
        if: always()
        run: |
          echo "================ LIFEOS DOCTOR REPORT ================"
          if [ "${{ steps.build_apk.outcome }}" == 'success' ]; then
            echo "✅ BUILD SUCCESS: No issues found. APK is ready."
            exit 0
          fi
          echo "❌ BUILD FAILED: Issue detected"
          echo "### 🩺 LifeOS Doctor Diagnosis ❌" >> $GITHUB_STEP_SUMMARY
          LOG_FILE="android/build.log"
          if [! -f "$LOG_FILE" ]; then
            echo "⚠️ **Issue:** Build failed before reaching the APK generation step (e.g., NPM install or sync failed)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if grep -q "Malformed root json" $LOG_FILE; then
            echo "👉 **ISSUE:** google-services.json file is malformed or empty" >> $GITHUB_STEP_SUMMARY
            echo "👉 **SOLUTION:** Re-download google-services.json from Firebase and update GitHub Secret carefully." >> $GITHUB_STEP_SUMMARY
          elif grep -q "Plugin with id 'com.google.gms.google-services' not found" $LOG_FILE; then
            echo "👉 **ISSUE:** google-services Gradle Plugin not found" >> $GITHUB_STEP_SUMMARY
            echo "👉 **SOLUTION:** Add classpath 'com.google.gms:google-services:4.4.1' in android/build.gradle and apply plugin in app/build.gradle." >> $GITHUB_STEP_SUMMARY
          elif grep -q "Namespace not specified" $LOG_FILE; then
            echo "👉 **ISSUE:** Namespace not specified for Android module" >> $GITHUB_STEP_SUMMARY
            echo "👉 **SOLUTION:** Add 'namespace' property inside android { } block in app/build.gradle." >> $GITHUB_STEP_SUMMARY
          elif grep -q "license" $LOG_FILE && grep -q "not accepted" $LOG_FILE; then
            echo "👉 **ISSUE:** Android SDK License not accepted" >> $GITHUB_STEP_SUMMARY
            echo "👉 **SOLUTION:** Add a step to accept licenses: yes | sdkmanager --licenses" >> $GITHUB_STEP_SUMMARY
          elif grep -q "No matching client found for package name" $LOG_FILE; then
            echo "👉 **ISSUE:** Package name mismatch between app and google-services.json" >> $GITHUB_STEP_SUMMARY
            echo "👉 **SOLUTION:** Make sure applicationId in build.gradle matches 'package_name' in Firebase JSON." >> $GITHUB_STEP_SUMMARY
          else
            echo "👉 **ISSUE:** Unknown Gradle Error Detected." >> $GITHUB_STEP_SUMMARY
            echo "🔍 **Raw Error Log (Last 30 lines):**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            tail -n 30 $LOG_FILE >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "======================================================"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        if: always()

      - name: Rename APK
        if: steps.build_apk.outcome == 'success'
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/LifeOS_v${{ github.run_number }}.apk

      - name: Analyze APK Size & Permissions
        if: steps.build_apk.outcome == 'success'
        id: apk_analysis
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/LifeOS_v${{ github.run_number }}.apk"
          APK_SIZE=$(du -h $APK_PATH | cut -f1)
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "### 📦 APK Analysis" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          $ANDROID_HOME/build-tools/34.0.0/aapt dump permissions $APK_PATH >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Build Summary
        if: always()
        run: |
          echo "### 📊 LifeOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      - name: Create Issue on Failure
        if: failure()
        uses: dacbd/create-issue-action@v2
        with:
          token: ${{ github.token }}
          title: "🚨 Build #${{ github.run_number }} Failed"
          body: |
            ### 🩺 LifeOS Doctor Report: Build Failed
            - **Commit:** ${{ github.sha }}
            - **Triggered By:** ${{ github.actor }}
            - **Action Logs:** [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            *Please check the GitHub Actions Summary page for the exact error breakdown.*
          assignees: ${{ github.actor }}

      - name: Create LifeOS Release
        if: steps.build_apk.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lifeos-v${{ github.run_number }}
          name: LifeOS Build ${{ github.run_number }}
          body: |
            ✅ **LifeOS: Your Complete Productivity Platform.**
            🚀 High-performance assets integrated.
            📱 Optimized for smooth loading.
            🔢 Build: ${{ github.run_number }}
            📅 Commit: ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/LifeOS_v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}