<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sukoon OS – Build Habits That Stick All Year</title>
    <meta name="description" content="Set yearly goals, track daily habits, and transform your life with AI insights, Islamic mode, and beautiful visualizations. Join 10K+ users." />
    <meta name="author" content="Sukoon OS" />
    <meta name="keywords" content="habit tracker, yearly goals, productivity app, Islamic habit tracker, sukoon os, daily tracking, self improvement, goal setting" />
    <meta name="robots" content="index, follow" />

    <!-- Mobile App Meta -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sukoon OS" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Sukoon OS – Build Habits That Stick All Year" />
    <meta property="og:description" content="Set yearly goals, track daily habits, and transform your life with AI insights and beautiful visualizations." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sukoon OS" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sukoon OS – Build Habits That Stick All Year" />
    <meta name="twitter:description" content="Transform your year with better habits. Track goals, build streaks, get AI insights." />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://nxvtoviyldffcqbtgriw.supabase.co" />

    <!-- Prevent navy blue/white flash during startup -->
    <style>
      html, body {
        background-color: hsl(209, 40%, 96%);
        margin: 0;
        padding: 0;
      }
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: hsl(215, 30%, 8%);
        }
      }
      /* Initial loading state before React mounts */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 3px solid hsl(200, 98%, 39%);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
