<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Yearly Track – Life Operating System</title>
    <meta name="description" content="Transform your life with mindful daily tracking, Islamic spirituality, and data-driven self-improvement." />
    <meta name="author" content="Yearly Track" />

    <!-- Mobile App Meta -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Yearly Track – Life Operating System" />
    <meta property="og:description" content="Transform your life with mindful daily tracking, Islamic spirituality, and data-driven self-improvement." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Yearly Track" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://nxvtoviyldffcqbtgriw.supabase.co" />

    <!-- Prevent navy blue/white flash during startup -->
    <style>
      html, body {
        background-color: hsl(209, 40%, 96%);
        margin: 0;
        padding: 0;
      }
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: hsl(215, 30%, 8%);
        }
      }
      /* Initial loading state before React mounts */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 3px solid hsl(200, 98%, 39%);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
